# =============================================================================
# Nav2 parameters for ANDR robot
# =============================================================================
# Robot specs (from URDF):
#   Frame:        base_link | odom | map | lidar_link
#   Drive:        Differential drive
#   Chassis:      0.30 m long × 0.30 m wide × 0.20 m tall
#   Footprint:    Front +0.075 m, Rear -0.225 m, Sides ±0.15 m from base_link
#   Wheel base:   0.34 m separation (chassis_width + wheel_thickness)
#   Wheel radius: 0.05 m
#   LiDAR:        360°, 0.12–12.0 m, /scan topic, lidar_link frame (on top of chassis)
#   Cmd topic:    /cmd_vel  |  Odom topic: /odom/filtered  (EKF — sensor_fusion.py)
#   Map source:   SLAM Toolbox → /map (no static map_server needed)
# =============================================================================

# ── BT Navigator ─────────────────────────────────────────────────────────────
bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    # Behavior tree xmls bundled with nav2_bt_navigator (Humble flat params)
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    default_nav_through_poses_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_selector_bt_node

# ── Controller Server (local planner) ────────────────────────────────────────
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5     # diff drive — no lateral motion
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker — how far the robot must move to not be considered stuck
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    # Goal checker — tolerances for reaching the goal
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    # Regulated Pure Pursuit controller
    # Good for differential drive: smooth paths, collision checking,
    # speed regulation near obstacles and high curvature.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # Linear velocity — keep moderate for indoor navigation
      desired_linear_vel: 0.4          # m/s cruise speed
      min_approach_linear_velocity: 0.05

      # Lookahead — how far ahead on the path to aim at
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: False

      # Approach velocity scaling — slow down near the goal
      approach_velocity_scaling_dist: 0.6

      # Regulated velocity scaling — slow down in tight turns / near obstacles
      use_regulated_linear_velocity_scaling: True
      use_cost_regulated_linear_velocity_scaling: False
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_fixed_curvature_lookahead: False
      curvature_lookahead_dist: 0.25

      # Rotation in place to align with path before moving
      use_rotate_to_heading: True
      rotate_to_heading_min_angle: 0.785   # ~45 deg threshold
      rotate_to_heading_angular_vel: 0.8   # rad/s
      max_angular_accel: 1.0

      # Collision detection along the lookahead arc
      use_collision_detection: True
      max_allowed_time_to_collision_up_to_carrot: 1.0

      # No reversing — robot drives forward only
      allow_reversing: False

      # TF / path search
      transform_tolerance: 0.1
      max_robot_pose_search_dist: 10.0
      use_interpolation: False

# ── Path Smoother Server ──────────────────────────────────────────────────────
smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

# ── Planner Server (global path planner) ─────────────────────────────────────
planner_server:
  ros__parameters:
    use_sim_time: False
    expected_planner_frequency: 20.0
    planners: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5          # goal search radius if goal is in obstacle
      use_astar: False         # Dijkstra (False) explores more evenly; set True for A*
      allow_unknown: True      # plan through unknown cells (useful during SLAM mapping)

# ── Behavior Server (recovery behaviors) ─────────────────────────────────────
behavior_server:
  ros__parameters:
    use_sim_time: False
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 1.0

# ── Waypoint Follower ─────────────────────────────────────────────────────────
waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: False
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

# ── Velocity Smoother ─────────────────────────────────────────────────────────
# Smooths cmd_vel commands to respect kinematic limits.
velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.0]    # [x, y, theta] m/s and rad/s
    min_velocity: [-0.5, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]
    odom_topic: "odom/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ── Local Costmap ─────────────────────────────────────────────────────────────
# Rolling window around the robot — used by the local controller.
# Obstacles from /scan mark cells; old obstacles are cleared by raytracing.
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: True
      width: 3          # metres — covers ~7m diameter for 12m lidar
      height: 3
      resolution: 0.05  # matches SLAM map resolution

      # Robot footprint in base_link frame
      # Chassis: front +0.10m, rear -0.30m, sides ±0.15m
      footprint: "[[-0.225, 0.15], [0.075, 0.15], [0.075, -0.15], [-0.225, -0.15]]"
      footprint_padding: 0.03    # tiny extra padding

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          max_obstacle_height: 2.0
          # Mark obstacles up to 2.5m for local avoidance
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          # Clear free space up to full lidar range
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          clearing: True
          marking: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Inflation radius > circumscribed robot radius (0.270m) + safety margin
        inflation_radius: 0.55
        # How sharply cost decays with distance — higher = sharper dropoff
        cost_scaling_factor: 3.0

      always_send_full_costmap: True

# ── Global Costmap ─────────────────────────────────────────────────────────────
# Covers the entire map. Static layer reads SLAM's /map topic.
# Obstacle layer adds live sensor data on top of the static map.
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05  # matches SLAM map resolution
      track_unknown_space: True

      footprint: "[[-0.225, 0.15], [0.075, 0.15], [0.075, -0.15], [-0.225, -0.15]]"
      footprint_padding: 0.03

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      # Static layer — subscribes to SLAM Toolbox's /map (transient_local QoS)
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      # Obstacle layer — overlays live lidar hits on the static map
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          max_obstacle_height: 2.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          clearing: True
          marking: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 3.0

      always_send_full_costmap: True

# ── Map Saver (optional, for use with nav2_map_server CLI) ───────────────────
map_saver:
  ros__parameters:
    use_sim_time: False
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True
