# andr_bot — ANDR project configuration
#
# Start with: python start.py
#             or: andr start --model llama3.2

# LLM settings
llm:
  backend: ollama            # ollama | openai
  model: qwen2.5          # model name
  host: http://localhost:11434
  temperature: 0.2

# Agent settings
agent:
  max_iterations: 20

# Task brain (scheduler, preemption, wander)
brain:
  enabled: true
  enable_wander: false           # Send idle prompts when no tasks pending
  wander_interval_sec: 60.0     # Seconds between wander prompts
  resume_preempted: true         # Resume interrupted tasks after higher-priority ones finish

# Scheduled tasks (run automatically on a timer)
# scheduled_tasks:
#   check_battery:
#     prompt: "Check your battery level and report it."
#     interval_sec: 300
#   patrol:
#     prompt: "Do a patrol of the area and report anything unusual."
#     interval_sec: 600

# Memory (ChromaDB RAG store)
memory:
  backend: chroma                          # only "chroma" supported for now
  persist_path: ~/andr_memory              # where ChromaDB stores data on disk
  collection_name: andr                    # Chroma collection name
  embedding_model: all-MiniLM-L6-v2       # SentenceTransformer model for embeddings
  top_k: 4                                # default number of results to retrieve

# Web UI
ui:
  enabled: true
  port: 8080

# System prompt (optional — override the default)
# system_prompt: |
#   You are a helpful robot assistant...
